services:
  coupon-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: coupon-api
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DATABASE_URL=jdbc:postgresql://postgres:5432/coupondb
      - DB_USERNAME=coupon
      - DB_PASSWORD=coupon
      - REDIS_HOST=redis
    depends_on:
      - postgres
      - redis
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: coupon-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=coupondb
      - POSTGRES_USER=coupon
      - POSTGRES_PASSWORD=coupon
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: coupon-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  postgres-data:
