spring:
  profiles:
    active: dev

  application:
    name: coupon

  cache:
    type: redis
    redis:
      time-to-live: 3600000

  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true

server:
  port: 8080

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
