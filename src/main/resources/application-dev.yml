logging:
  level:
    com.coupon: DEBUG

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/coupondb
    driver-class-name: org.postgresql.Driver
    username: coupon
    password: coupon
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
  data:
    redis:
      host: localhost
      port: 6379

management:
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans
  tracing:
    sampling:
      probability: 1.0
